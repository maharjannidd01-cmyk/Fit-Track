<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<title>FitTrack Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c10;--surface:#111620;--surface2:#1a2030;--border:#242b38;
  --accent:#c8ff00;--accent2:#ff5e3a;--blue:#00cfff;--green:#2ecc71;
  --text:#eef2ff;--muted:#5a6380;--nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overflow:hidden;}
#app{height:100%;}
#shell{display:flex;flex-direction:column;height:100%;}
#page-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px);}
#page-content::-webkit-scrollbar{display:none;}

/* NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:rgba(8,12,16,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding:0 4px;padding-bottom:var(--safe-b);z-index:1000;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;padding:10px 8px 0;min-width:50px;transition:color .2s;font-family:'DM Sans',sans-serif;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.5px;}

/* PAGE */
.page{min-height:100%;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{background:var(--surface);padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.ph-day{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.ph-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--muted);padding:18px 16px 8px;text-transform:uppercase;}

/* BUTTONS */
.btn-primary{display:block;width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;}
.btn-primary:active{transform:scale(.97);background:#b0e600;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:13px 18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-secondary:active{border-color:var(--accent);color:var(--accent);}

/* HOME */
.home-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 0;}
.greeting-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.day-num{color:var(--accent);font-size:30px;}
.date-str{font-size:12px;color:var(--muted);margin-top:2px;}
.streak-badge{background:rgba(255,94,58,.12);border:1px solid rgba(255,94,58,.3);border-radius:20px;padding:6px 12px;font-size:12px;color:#ff7a5a;font-weight:600;}
.today-card{margin:14px 16px;background:var(--surface);border:1px solid var(--split-color,var(--accent));border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.today-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--split-color,var(--accent));}
.today-split-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.today-split-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;margin-bottom:3px;}
.today-split-sub{font-size:12px;color:var(--muted);}
.session-done-badge{margin-top:10px;font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-card.warn{border-color:rgba(255,94,58,.4);}.stat-card.good{border-color:rgba(46,204,113,.3);}
.stat-icon{font-size:18px;margin-bottom:5px;}.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);line-height:1;}
.stat-label{font-size:11px;color:var(--text);font-weight:500;margin-top:2px;}.stat-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.overall-progress{padding:0 16px;}.overall-bar{background:var(--surface2);border-radius:4px;height:28px;position:relative;overflow:hidden;}
.overall-fill{height:100%;background:linear-gradient(90deg,var(--accent),#80ff40);border-radius:4px;transition:width 1s ease;}
.overall-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;font-weight:700;}
.water-weight-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.water-card,.weight-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.ww-label{font-size:12px;font-weight:600;margin-bottom:10px;}
.water-glasses{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px;}
.glass-btn{background:var(--border);border:none;border-radius:6px;padding:6px 4px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;}
.glass-btn.filled{background:rgba(0,207,255,.15);color:#00cfff;}
.weight-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;padding:8px;text-align:center;margin-bottom:5px;}
.weight-input:focus{outline:none;border-color:var(--accent);}
.ww-sub{font-size:10px;color:var(--muted);}
.upcoming-list{padding:0 16px;display:grid;gap:8px;}
.upcoming-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:0 8px 8px 0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.upcoming-day{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* ═══════ WORKOUT PAGE ═══════ */
/* Sticky session header */
.session-header{position:sticky;top:0;z-index:9;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:10px 16px;gap:12px;}
.session-block{display:flex;flex-direction:column;align-items:center;}
.sess-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);}
.sess-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;}
.sess-burn{color:#ff5e3a;}
.sess-progress-block{flex:1;}
.sess-prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.sess-prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}
.sess-prog-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:center;}

/* Rest Timer */
.rest-panel{background:rgba(8,12,16,.97);border-bottom:1px solid var(--border);padding:16px;}
.rest-inner{display:flex;align-items:center;gap:16px;}
.rest-ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0;}
.rest-svg{width:90px;height:90px;}
.rest-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.rest-label-sm{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);}
.rest-count{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);line-height:1;}
.rest-btns{display:flex;flex-wrap:wrap;gap:8px;flex:1;align-items:center;}
.rest-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;}
.rest-btn:active{border-color:var(--accent);color:var(--accent);}
.rest-skip{background:rgba(200,255,0,.1);border:1px solid rgba(200,255,0,.3);color:var(--accent);border-radius:8px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}

/* Exercise Cards */
.exercises-list{padding:12px 16px;display:grid;gap:12px;}
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .3s;}
.exercise-card.ex-done{border-color:rgba(200,255,0,.35);background:rgba(200,255,0,.03);}
.ex-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 0;}
.ex-card-left{display:flex;align-items:center;gap:10px;}
.ex-card-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--border);line-height:1;min-width:28px;}
.ex-card-name{font-size:14px;font-weight:600;color:var(--text);}
.ex-card-scheme{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);margin-top:2px;}
.ex-done-badge{background:rgba(200,255,0,.15);border:1px solid rgba(200,255,0,.35);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--accent);font-weight:700;display:flex;align-items:center;}
.ex-card-note{padding:6px 14px;font-size:11px;color:var(--muted);font-style:italic;}
.ex-prev-load{padding:6px 14px 10px;font-size:12px;color:#00cfff;background:rgba(0,207,255,.05);border-bottom:1px solid rgba(0,207,255,.1);}
.ex-prev-load.no-prev{color:var(--muted);background:transparent;border-bottom-color:var(--border);}

/* Set Table */
.set-table{padding:10px 14px 14px;}
.set-table-head{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:8px;margin-bottom:6px;}
.set-table-head span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-align:center;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);transition:background .2s;}
.set-row:last-child{border-bottom:none;}
.set-row.set-done{background:rgba(200,255,0,.05);}
.set-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:center;}
.set-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:8px 6px;text-align:center;width:100%;}
.set-input:focus{outline:none;border-color:var(--accent);}
.set-input[readonly]{background:rgba(200,255,0,.05);border-color:rgba(200,255,0,.15);color:var(--accent);}
.set-done-btn{width:100%;height:38px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;transition:all .2s;font-weight:700;}
.set-done-btn:active{transform:scale(.9);}
.set-done-active{background:var(--accent)!important;border-color:var(--accent)!important;color:#000!important;}
.cardio-note-card{padding:10px 14px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted);}
.workout-footer{padding:16px;}
.btn-finish{width:100%;background:rgba(255,61,106,.15);border:1px solid rgba(255,61,106,.4);color:#ff3d6a;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.btn-finish:active{background:rgba(255,61,106,.3);}

/* ═══════ CALORIES ═══════ */
.calorie-ring-section{display:flex;align-items:center;gap:20px;padding:18px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.calorie-ring{position:relative;width:110px;height:110px;flex-shrink:0;}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);line-height:1;}
.ring-label{font-size:10px;color:var(--muted);}
.macro-summary{flex:1;display:grid;gap:8px;}
.macro-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.macro-item.remaining{color:var(--accent);font-weight:600;}.macro-item.over{color:var(--accent2);}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.food-search-section,.custom-food-section,.food-log-section{padding:0 16px;}
.food-search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 16px;margin-bottom:8px;}
.food-search-input::placeholder{color:var(--muted);}
.food-search-input:focus{outline:none;border-color:var(--accent);}
.food-result-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:5px;}
.food-result-item:active{border-color:var(--accent);}
.fr-name{font-size:13px;}.fr-cal{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);}
.no-results{font-size:13px;color:var(--muted);padding:8px 0;}
.custom-food-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.cf-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;width:100%;grid-column:1/-1;}
.cf-input.small{grid-column:auto;}
.cf-input::placeholder{color:var(--muted);}
.cf-input:focus{outline:none;border-color:var(--accent);}
.food-log-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.food-log-info{flex:1;}.food-log-name{font-size:13px;font-weight:500;}
.food-log-macros{font-size:11px;color:var(--muted);margin-top:2px;}
.food-log-cal{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent);flex-shrink:0;}
.food-remove-btn{background:rgba(255,94,58,.1);border:none;color:var(--accent2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px;flex-shrink:0;}
.empty-log{font-size:13px;color:var(--muted);}

/* ═══════ PROGRESS ═══════ */
.progress-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px;}
.prog-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;}
.ps-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);line-height:1;}
.ps-label{font-size:10px;color:var(--muted);margin-top:2px;}
.chart-container{margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px 8px;position:relative;height:180px;}
.bar-chart{display:flex;align-items:flex-end;height:130px;gap:6px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;}
.bar-fill{width:100%;min-height:3px;border-radius:4px 4px 0 0;position:relative;transition:height .5s ease;display:flex;align-items:flex-start;justify-content:center;}
.bar-fill.under{background:linear-gradient(to top,var(--accent),rgba(200,255,0,.4));}
.bar-fill.over{background:linear-gradient(to top,var(--accent2),rgba(255,94,58,.4));}
.bar-val{font-size:8px;color:#000;font-weight:700;margin-top:2px;white-space:nowrap;}
.bar-label{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.target-line{position:absolute;left:12px;right:12px;border-top:1px dashed rgba(255,255,255,.2);}
.target-label{position:absolute;right:0;top:-14px;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.weight-list{padding:0 16px;display:grid;gap:6px;}
.weight-entry{display:flex;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.we-date{font-size:12px;color:var(--muted);}.we-weight{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);}
.profile-form{padding:0 16px 24px;display:grid;gap:8px;}
.pf-label{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.pf-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;width:100%;}
.pf-input:focus{outline:none;border-color:var(--accent);}

/* ═══════ EXPORT ═══════ */
.filter-btn-row{display:flex;gap:8px;margin-bottom:14px;}
.filter-btn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.filter-btn.active{background:rgba(200,255,0,.1);border-color:rgba(200,255,0,.4);color:var(--accent);}
.filter-date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.export-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.exp-s{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;}
.exp-sv{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1;}
.exp-sl{font-size:10px;color:var(--muted);margin-top:2px;}
.export-rows{display:grid;gap:8px;margin-bottom:12px;}
.export-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.export-date{padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface2);}
.export-cells{display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
.ec{padding:8px 6px;text-align:center;border-right:1px solid var(--border);}
.ec:last-child{border-right:none;}
.ec-l{display:block;font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.ec-v{display:block;font-size:12px;font-weight:600;}
.ec-good{color:var(--green);}.ec-warn{color:var(--accent2);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:2000;transition:opacity .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.toast-ok{border-color:rgba(200,255,0,.4);color:var(--accent);}
.toast-error{border-color:rgba(255,94,58,.4);color:var(--accent2);}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#5a6380;">Loading FitTrack…</div></div>
<script src="app.js"></script>
</body>
</html>
