<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<title>FitTrack Pro</title>
<link rel="manifest" href="manifest.json">
<style>
/* ── RESET ───────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
input,button,select,textarea{font-family:inherit;font-size:inherit;}

/* ── TOKENS ──────────────────────────── */
:root{
  --bg:         #0d0d0d;
  --card:       #161616;
  --card2:      #1e1e1e;
  --line:       #2a2a2a;
  --accent:     #c9ff3e;
  --accent-dim: rgba(201,255,62,.12);
  --red:        #ff4f4f;
  --blue:       #3ecfff;
  --purple:     #b57bff;
  --green:      #3effa0;
  --orange:     #ff8c3e;
  --yellow:     #ffd93e;
  --text:       #f0f0f0;
  --sub:        #888;
  --faint:      #444;
  --nav:        64px;
  --safe:       env(safe-area-inset-bottom, 0px);
  --r:          10px;
}

/* ── BASE ────────────────────────────── */
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;line-height:1.5;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;}

/* ── SCROLL AREA ─────────────────────── */
#scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav) + var(--safe) + 12px);
}
#scroll::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ──────────────────────── */
#nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav) + var(--safe));
  padding-bottom:var(--safe);
  background:rgba(13,13,13,.96);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  display:flex;align-items:stretch;
  z-index:900;
}
.nb{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;background:none;border:none;
  color:var(--sub);cursor:pointer;
  padding:0;transition:color .15s;
}
.nb.on{color:var(--accent);}
.nb i{font-size:22px;line-height:1;}
.nb span{font-size:10px;font-weight:600;letter-spacing:.3px;}

/* ── PAGE ANIMATION ──────────────────── */
.page{animation:rise .2s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPOGRAPHY ──────────────────────── */
.page-title{font-size:22px;font-weight:700;padding:20px 16px 4px;}
.page-sub{font-size:13px;color:var(--sub);padding:0 16px 16px;}
.sec{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--sub);
  text-transform:uppercase;padding:20px 16px 8px;}

/* ── CARDS ───────────────────────────── */
.card{background:var(--card);border-radius:var(--r);
  border:1px solid var(--line);overflow:hidden;}
.pad{padding:14px 16px;}
.mx{margin:0 16px;}
.mb{margin-bottom:10px;}

/* ── STAT ROW ────────────────────────── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.stat-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 12px;text-align:center;}
.stat-box .val{font-size:26px;font-weight:800;color:var(--accent);line-height:1;margin-bottom:3px;}
.stat-box .lbl{font-size:11px;color:var(--sub);font-weight:500;}
.stat-box .sub{font-size:10px;color:var(--faint);margin-top:2px;}
.stat-box.warn .val{color:var(--red);}
.stat-box.good .val{color:var(--green);}

/* ── PROGRESS BAR ────────────────────── */
.prog-wrap{background:var(--card2);border-radius:4px;height:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease;}
.prog-fill.red{background:var(--red);}

/* ── PILL BADGE ──────────────────────── */
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px;}
.pill-g{background:rgba(62,255,160,.12);color:var(--green);border:1px solid rgba(62,255,160,.25);}
.pill-r{background:rgba(255,79,79,.12);color:var(--red);border:1px solid rgba(255,79,79,.25);}
.pill-y{background:rgba(255,217,62,.12);color:var(--yellow);border:1px solid rgba(255,217,62,.25);}
.pill-b{background:rgba(62,207,255,.12);color:var(--blue);border:1px solid rgba(62,207,255,.25);}
.pill-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(201,255,62,.3);}

/* ── BUTTONS ─────────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 20px;border-radius:var(--r);border:none;
  font-weight:700;font-size:15px;cursor:pointer;transition:all .15s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-a{background:var(--accent);color:#000;}
.btn-a:active{background:#b5e835;}
.btn-o{background:var(--card2);color:var(--text);border:1px solid var(--line);}
.btn-r{background:rgba(255,79,79,.12);color:var(--red);border:1px solid rgba(255,79,79,.3);}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;width:auto;}

/* ── INPUTS ──────────────────────────── */
.inp{width:100%;background:var(--card2);border:1px solid var(--line);
  border-radius:8px;color:var(--text);padding:11px 14px;
  font-size:15px;transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--accent);}
.inp::placeholder{color:var(--faint);}
.inp-sm{padding:8px 10px;font-size:14px;text-align:center;border-radius:8px;}
label.lbl{display:block;font-size:11px;font-weight:600;color:var(--sub);
  letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase;}

/* ── SPLIT COLORS ────────────────────── */
.c-legs{color:#b57bff;} .bg-legs{border-left-color:#b57bff!important;}
.c-push{color:#ff6b3e;} .bg-push{border-left-color:#ff6b3e!important;}
.c-pull{color:#3ecfff;} .bg-pull{border-left-color:#3ecfff!important;}
.c-lower{color:#3effa0;}.bg-lower{border-left-color:#3effa0!important;}
.c-upper{color:#ffd93e;}.bg-upper{border-left-color:#ffd93e!important;}
.c-hiit{color:#ff4f4f;} .bg-hiit{border-left-color:#ff4f4f!important;}
.c-rest{color:#888;}    .bg-rest{border-left-color:#888!important;}

/* ─────────────────────────────────────
   HOME PAGE
───────────────────────────────────── */
.hero{
  margin:16px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:18px;border-left:4px solid var(--accent);
  position:relative;overflow:hidden;
}
.hero-day-label{font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:var(--sub);text-transform:uppercase;margin-bottom:6px;}
.hero-split{font-size:28px;font-weight:800;line-height:1.1;margin-bottom:4px;}
.hero-sub{font-size:13px;color:var(--sub);margin-bottom:16px;}
.hero-prog-row{display:flex;justify-content:space-between;
  font-size:11px;color:var(--sub);margin-bottom:6px;}
.hero-actions{display:flex;gap:8px;margin-top:14px;}
.hero-actions .btn{flex:1;}
.session-live{margin-top:12px;padding:10px 12px;background:var(--accent-dim);
  border-radius:8px;border:1px solid rgba(201,255,62,.25);
  display:flex;align-items:center;justify-content:space-between;}
.session-live-label{font-size:12px;color:var(--accent);font-weight:600;}
.session-live-val{font-size:14px;font-weight:800;color:var(--accent);
  font-variant-numeric:tabular-nums;}

.macro-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;}
.macro-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:12px 8px;text-align:center;}
.macro-card .mv{font-size:18px;font-weight:800;line-height:1;margin-bottom:3px;}
.macro-card .ml{font-size:9px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

.water-row{display:flex;align-items:center;gap:6px;padding:0 16px;}
.glass{width:32px;height:32px;border-radius:6px;border:2px solid var(--line);
  background:var(--card2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.glass.on{background:rgba(62,207,255,.15);border-color:rgba(62,207,255,.4);}
.water-count{font-size:13px;color:var(--sub);margin-left:4px;white-space:nowrap;}

.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-bottom:1px solid var(--line);}
.upcoming-item:last-child{border-bottom:none;}
.up-day{font-size:11px;color:var(--sub);width:40px;flex-shrink:0;}
.up-split{font-size:14px;font-weight:600;}
.up-sub{font-size:11px;color:var(--sub);margin-top:1px;}

/* ─────────────────────────────────────
   WORKOUT PAGE
───────────────────────────────────── */
.session-bar{
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,13,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:10px 16px;gap:12px;
}
.sb-block{text-align:center;flex-shrink:0;}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--sub);
  text-transform:uppercase;margin-bottom:2px;}
.sb-val{font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.sb-prog{flex:1;}
.sb-prog-bar{height:5px;background:var(--card2);border-radius:3px;margin-bottom:4px;overflow:hidden;}
.sb-prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.sb-prog-label{font-size:10px;color:var(--sub);text-align:center;}

/* Rest timer overlay */
.rest-overlay{
  background:var(--card);border-bottom:1px solid var(--line);
  padding:14px 16px;display:flex;align-items:center;gap:16px;
}
.rest-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
.rest-ring-wrap svg{width:80px;height:80px;}
.rest-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.rest-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--sub);text-transform:uppercase;}
.rest-count{font-size:24px;font-weight:800;color:var(--accent);
  line-height:1;font-variant-numeric:tabular-nums;}
.rest-actions{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
.rest-btn{background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:1;}
.rest-btn:active{border-color:var(--accent);color:var(--accent);}
.rest-skip{background:var(--accent-dim);border:1px solid rgba(201,255,62,.3);
  color:var(--accent);border-radius:8px;padding:8px 12px;
  font-size:13px;font-weight:700;cursor:pointer;width:100%;}

/* Exercise card */
.ex-card{background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);margin:0 16px 10px;overflow:hidden;}
.ex-card.done{border-color:rgba(201,255,62,.3);}
.ex-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 0;}
.ex-left{display:flex;align-items:flex-start;gap:10px;}
.ex-num{font-size:26px;font-weight:800;color:var(--faint);line-height:1;min-width:26px;}
.ex-name{font-size:15px;font-weight:700;color:var(--text);}
.ex-scheme{font-size:12px;color:var(--accent);font-weight:600;margin-top:1px;}
.ex-note{padding:5px 14px 8px 50px;font-size:12px;color:var(--sub);font-style:italic;}
.ex-prev{padding:6px 14px 8px;font-size:12px;color:var(--blue);
  background:rgba(62,207,255,.05);border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);}
.ex-prev.none{color:var(--faint);background:transparent;}

/* Set table */
.set-tbl{padding:8px 14px 12px;}
.set-head{display:grid;grid-template-columns:28px 1fr 1fr 40px;gap:6px;
  margin-bottom:6px;padding:0 2px;}
.set-head span{font-size:10px;font-weight:700;letter-spacing:1px;
  color:var(--sub);text-transform:uppercase;text-align:center;}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 40px;gap:6px;
  align-items:center;padding:4px 2px;border-radius:6px;
  transition:background .2s;margin-bottom:2px;}
.set-row.done-row{background:var(--accent-dim);}
.set-num{font-size:13px;font-weight:700;color:var(--faint);text-align:center;}
.set-inp{background:var(--card2);border:1px solid var(--line);border-radius:7px;
  color:var(--text);padding:9px 6px;font-size:15px;font-weight:600;
  text-align:center;width:100%;transition:border-color .15s;}
.set-inp:focus{outline:none;border-color:var(--accent);}
.set-inp[readonly]{background:var(--accent-dim);border-color:rgba(201,255,62,.2);color:var(--accent);}
.set-check{width:40px;height:38px;border-radius:8px;border:2px solid var(--line);
  background:transparent;color:var(--faint);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-weight:700;}
.set-check:active{transform:scale(.88);}
.set-check.on{background:var(--accent);border-color:var(--accent);color:#000;}

.cardio-ex{padding:10px 14px 12px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;}
.cardio-info{font-size:13px;color:var(--sub);}
.ex-finish-btn{
  margin:0 14px 12px;padding:10px;background:rgba(255,79,79,.1);
  border:1px solid rgba(255,79,79,.3);border-radius:8px;color:var(--red);
  font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 28px);}

/* ─────────────────────────────────────
   CALORIES PAGE
───────────────────────────────────── */
.ring-section{display:flex;align-items:center;gap:16px;
  padding:14px 16px;background:var(--card);border-bottom:1px solid var(--line);}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
.ring-wrap svg{width:100px;height:100px;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.ring-val{font-size:22px;font-weight:800;color:var(--accent);line-height:1;}
.ring-lbl{font-size:10px;color:var(--sub);margin-top:2px;}
.macro-list{flex:1;display:flex;flex-direction:column;gap:8px;}
.macro-row{display:flex;align-items:center;justify-content:space-between;}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.macro-name{font-size:13px;color:var(--sub);margin-left:8px;flex:1;}
.macro-val{font-size:14px;font-weight:700;}

.food-result{background:var(--card2);border:1px solid var(--line);border-radius:8px;
  padding:11px 14px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;margin-bottom:6px;}
.food-result:active{border-color:var(--accent);}
.fr-cal{font-size:13px;font-weight:700;color:var(--accent);}

.food-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--line);}
.food-item:last-child{border-bottom:none;}
.fi-info{flex:1;}
.fi-name{font-size:14px;font-weight:600;}
.fi-mac{font-size:11px;color:var(--sub);margin-top:2px;}
.fi-cal{font-size:14px;font-weight:700;color:var(--accent);}
.fi-rm{background:transparent;border:none;color:var(--faint);font-size:18px;
  cursor:pointer;padding:4px 8px;border-radius:6px;}
.fi-rm:active{color:var(--red);}

/* ─────────────────────────────────────
   HISTORY PAGE
───────────────────────────────────── */
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--line);cursor:pointer;}
.hist-item:last-child{border-bottom:none;}
.hist-item:active{background:var(--card2);}
.hi-date{font-size:13px;font-weight:700;min-width:60px;}
.hi-info{flex:1;}
.hi-split{font-size:14px;font-weight:600;}
.hi-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.hi-caret{color:var(--faint);font-size:18px;}

/* Edit modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;
  display:flex;align-items:flex-end;
}
.modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;
  max-height:88vh;overflow-y:auto;padding-bottom:var(--safe);}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:16px;border-bottom:1px solid var(--line);position:sticky;
  top:0;background:var(--bg);z-index:1;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{background:var(--card2);border:none;color:var(--text);
  width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.edit-row{padding:14px 16px;border-bottom:1px solid var(--line);}
.edit-row:last-child{border-bottom:none;}

/* ─────────────────────────────────────
   SETTINGS PAGE
───────────────────────────────────── */
.setting-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--line);}
.setting-row:last-child{border-bottom:none;}
.sr-label{font-size:15px;font-weight:600;}
.sr-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.sr-right{display:flex;align-items:center;gap:8px;}

/* ─────────────────────────────────────
   EXPORT PAGE
───────────────────────────────────── */
.filter-tabs{display:flex;gap:6px;padding:0 16px;}
.ftab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);
  background:var(--card2);color:var(--sub);font-size:13px;
  font-weight:700;cursor:pointer;text-align:center;}
.ftab.on{background:var(--accent-dim);border-color:rgba(201,255,62,.35);color:var(--accent);}

.exp-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;}
.exp-s{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:10px 6px;text-align:center;}
.exp-sv{font-size:20px;font-weight:800;color:var(--accent);line-height:1;}
.exp-sl{font-size:9px;color:var(--sub);margin-top:3px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;}

.exp-row{background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);margin:0 16px 8px;overflow:hidden;}
.exp-row-head{padding:10px 14px;background:var(--card2);
  border-bottom:1px solid var(--line);font-size:14px;font-weight:700;}
.exp-row-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.exp-cell{padding:8px 14px;border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);}
.exp-cell:nth-child(2n){border-right:none;}
.exp-cell:last-child,.exp-cell:nth-last-child(2){border-bottom:none;}
.ec-l{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:2px;}
.ec-v{font-size:14px;font-weight:700;}
.ec-v.g{color:var(--green);}.ec-v.r{color:var(--red);}.ec-v.a{color:var(--accent);}

/* ── TOAST ───────────────────────────── */
#toast{
  position:fixed;left:50%;bottom:calc(var(--nav) + var(--safe) + 12px);
  transform:translateX(-50%);
  background:var(--card);border:1px solid var(--line);
  padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;
  z-index:1000;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5);
}
#toast.ok{color:var(--accent);border-color:rgba(201,255,62,.35);}
#toast.err{color:var(--red);border-color:rgba(255,79,79,.35);}
</style>
</head>
<body>
<div id="app">
  <div id="scroll"></div>
  <nav id="nav">
    <button class="nb on" data-p="home"    onclick="go('home')">   <i>🏠</i><span>Home</span></button>
    <button class="nb"    data-p="workout" onclick="go('workout')"> <i>💪</i><span>Workout</span></button>
    <button class="nb"    data-p="calories"onclick="go('calories')"><i>🍽️</i><span>Food</span></button>
    <button class="nb"    data-p="history" onclick="go('history')"> <i>📋</i><span>History</span></button>
    <button class="nb"    data-p="export"  onclick="go('export')">  <i>📤</i><span>Export</span></button>
  </nav>
</div>
<div id="modal-root"></div>
<div id="toast" style="opacity:0"></div>
<script src="app.js"></script>
</body>
</html>
